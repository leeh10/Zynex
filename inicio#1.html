<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyrox Network UI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

/* Fondo principal */
body{
background: radial-gradient(circle at top,#141414,#000000 70%);
}

/* Partículas */
#particles{
position:fixed;
width:100%;
height:100%;
z-index:1;
top:0;
left:0;
overflow:hidden;
}

.particle{
position:absolute;
background:rgba(255,255,255,0.08);
border-radius:50%;
filter:blur(1px);
animation:float linear infinite;
}

@keyframes float{
0%{ transform:translateY(100vh); opacity:0; }
20%{ opacity:1; }
100%{ transform:translateY(-120px); opacity:0; }
}

/* contenido normal */
.main-content{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
z-index:2;
}

.main-content h1{
font-size:35px;
font-weight:700;
margin-bottom:10px;
}

.main-content p{
color:#888;
}

/* OFFLINE SCREEN */
#offline-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
background: radial-gradient(circle at center, rgba(60,60,60,0.10), rgba(30,30,30,0.15), rgba(10,10,10,0.9), black);
backdrop-filter:blur(35px);
}

/* Caja */
.ios-alert{
width:320px;
padding:35px;
border-radius:35px;
background: linear-gradient(180deg, rgba(30,30,30,0.92), rgba(10,10,10,0.95));
border:1px solid rgba(255,255,255,.18);
box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 15px 40px rgba(0,0,0,.7), inset 0 1px 1px rgba(255,255,255,.10), inset 0 -20px 30px rgba(0,0,0,.7);
backdrop-filter:blur(30px);
animation:popup .5s;
}

@keyframes popup{
0%{ transform:scale(.8); opacity:0; }
100%{ transform:scale(1); opacity:1; }
}

/* 🔥 FIX DEL SPINNER: Dimensiones fijas con display block para que no se deforme jamás */
.spinner{
width:45px;
height:45px;
display: block;
margin:0 auto 20px auto;
border-radius:50%;
border:3px solid rgba(255,255,255,.08);
border-top:3px solid white;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{ transform:rotate(360deg) }
}

h2{
font-size:24px;
text-align:center;
margin-bottom:10px;
}

.desc{
text-align:center;
color:#9c9c9c;
line-height:1.5;
margin-bottom:25px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background: linear-gradient(180deg, rgba(70,70,70,.4), rgba(25,25,25,.8));
border:1px solid rgba(255,255,255,.1);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(.97);
background: rgba(70,70,70,.6);
}

/* 🔥 FIX DE ALINEACIÓN: Flex dinámico en lugar de absolute para mantener el loader perfecto */
#connecting{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
width: 100%;
}

.loading-text{
margin-top:15px;
font-size:15px;
color:#aaa;
}

/* 👑 NUEVA INTERFAZ DEL LOGO ZYNEX (OCULTA POR DEFECTO) */
#success-ui {
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
width: 100%;
animation: popup 0.4s ease-out;
}

.logo-container {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
margin-bottom: 15px;
}

.logo-badge {
width: 40px;
height: 40px;
background: #007AFF;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-weight: 800;
font-size: 18px;
box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
border: 1px solid rgba(255,255,255,0.2);
}

.logo-title {
font-size: 24px;
font-weight: 700;
letter-spacing: -0.5px;
}

.success-text {
color: #30D158;
font-size: 15px;
font-weight: 600;
text-align: center;
}
</style>
</head>

<body>

<div id="particles"></div>

<div class="main-content">
<h1>Zyrox</h1>
<p>Sistema conectado</p>
</div>

<div id="offline-screen">
<div class="ios-alert" id="box">

    <div id="error">
        <div class="spinner"></div>
        <h2>Sin conexión</h2>
        <p class="desc">
        No pudimos conectar con el servidor.<br>
        Verifica tu red e inténtalo nuevamente.
        </p>
        <button class="btn" onclick="retry()">
        Reintentar
        </button>
    </div>

    <div id="connecting">
        <div class="spinner"></div>
        <div class="loading-text">Conectando...</div>
    </div>

    <div id="success-ui">
        <div class="logo-container">
            <div class="logo-badge">Z</div>
            <div class="logo-title">Logo | Zynex</div>
        </div>
        <div class="success-text">Has vuelto a conectarte</div>
    </div>

</div>
</div>

<script>
/* partículas intactas */
let container=document.getElementById("particles");
for(let i=0;i<35;i++){
let p=document.createElement("div");
p.classList.add("particle");
let size=Math.random()*4+2;
p.style.width=size+"px";
p.style.height=size+"px";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(Math.random()*10+8)+"s";
p.style.animationDelay=Math.random()*5+"s";
container.appendChild(p);
}

/* internet */
function checkConnection(){
if(!navigator.onLine){
showOffline();
}else{
hideOffline();
}
}

function showOffline(){
document.getElementById("offline-screen").style.display="flex";
}

function hideOffline(){
document.getElementById("offline-screen").style.display="none";
}

/* 🔥 LÓGICA DE TRANSICIÓN MEJORADA */
function retry(){
// Ocultar pantalla de error y mostrar el "Conectando..." centrado
document.getElementById("error").style.display="none";
document.getElementById("connecting").style.display="flex";

setTimeout(()=>{
if(navigator.onLine){
    // Ocultar carga y mostrar tu Logo de Zynex chido
    document.getElementById("connecting").style.display="none";
    document.getElementById("success-ui").style.display="flex";
    
    // Esperar 1.5 segundos para que se aprecie la animación del logo y redirigir
    setTimeout(() => {
        window.location.href = "Inicio #1.html";
    }, 1500);
}
else{
    // Si sigue fallando, regresa al botón de reintentar
    document.getElementById("connecting").style.display="none";
    document.getElementById("error").style.display="block";
}
},2000)
}

/* detectar internet en tiempo real */
window.addEventListener("online", hideOffline);
window.addEventListener("offline", showOffline);

checkConnection();
</script>

</body>
</html>
