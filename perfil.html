<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeonCord - Perfil Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000000; color: #ffffff; min-height: 100vh; padding-bottom: 80px; }

        /* Premium Nitro Header Card */
        .nitro-banner { position: relative; height: 160px; background: linear-gradient(45deg, #ff0055, #7a00ff, #00d2ff); overflow: hidden; display: flex; align-items: flex-end; padding: 20px; }
        .nitro-banner::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(0,0,0,0) 20%, rgba(0,0,0,0.8) 100%); }
        
        /* Animated neon lines for Nitro effect */
        .nitro-sparkles { position: absolute; width: 200%; height: 200%; background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%); animation: shine 4s infinite linear; top: -50%; left: -50%; transform: rotate(-15deg); }
        @keyframes shine { 0% { transform: translate(-30%, -30%) rotate(-15deg); } 100% { transform: translate(30%, 30%) rotate(-15deg); } }

        .profile-wrapper { position: relative; padding: 0 20px; margin-top: -50px; max-width: 500px; margin-left: auto; margin-right: auto; }
        
        .avatar-container { position: relative; display: inline-block; }
        .large-avatar { width: 100px; height: 100px; border-radius: 50%; background: #1c1c1e; border: 4px solid #000000; box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); overflow: hidden; display: flex; justify-content: center; align-items: center; font-size: 40px; }
        
        /* Badge Nitro animado */
        .nitro-badge { position: absolute; bottom: 0; right: 0; background: linear-gradient(135deg, #ff0055, #7a00ff); border: 2px solid #000; padding: 4px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 0 10px #ff0055; animation: pulseBadge 1.5s infinite alternate; }
        @keyframes pulseBadge { from { transform: scale(1); box-shadow: 0 0 8px #ff0055; } to { transform: scale(1.06); box-shadow: 0 0 16px #7a00ff; } }

        .user-info { margin-top: 15px; margin-bottom: 25px; }
        .user-info h2 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .user-info p { color: #8e8e93; font-size: 14px; margin-top: 4px; }

        .ios-section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #8e8e93; margin-bottom: 8px; margin-left: 8px; letter-spacing: 0.5px; }
        .ios-group-box { background: rgba(28, 28, 30, 0.7); border-radius: 14px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        
        .ios-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ios-row:last-child { border-bottom: none; }
        .row-label { font-size: 16px; color: #ffffff; }
        .row-val { font-size: 15px; color: #8e8e93; }

        .nitro-card { background: linear-gradient(135deg, rgba(255, 0, 85, 0.15), rgba(122, 0, 255, 0.15)); border: 1px solid rgba(255, 0, 85, 0.3); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(255, 0, 85, 0.1); }
        .nitro-card h3 { color: #ff0055; font-size: 18px; font-weight: 700; margin-bottom: 6px; text-shadow: 0 0 10px rgba(255, 0, 85, 0.4); }
        .nitro-card p { font-size: 13px; color: #e3e5e8; line-height: 1.4; margin-bottom: 15px; }

        .ios-btn-danger { width: 100%; padding: 15px; background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; text-align: center; display: block; text-decoration: none; }
        .ios-btn-danger:active { background: rgba(255, 59, 48, 0.3); }

        /* Bottom Nav */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; text-decoration: none; font-weight: 500; }
        .tab-item.active { color: #00d2ff; }
        .tab-icon { font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="nitro-banner">
        <div class="nitro-sparkles"></div>
    </div>

    <div class="profile-wrapper">
        <div class="avatar-container">
            <div class="large-avatar">⚡</div>
            <div class="nitro-badge">NITRO Ultra</div>
        </div>

        <div class="user-info">
            <h2>Zyrox Hub <span style="color:#00d2ff; font-size:18px;">✔</span></h2>
            <p>@zyroxhub.vip</p>
        </div>

        <!-- Nitro Especial Feature Block -->
        <div class="nitro-card">
            <h3>Boost de Perfil Activo</h3>
            <p>Tienes acceso a mandar audios ilimitados, fotos en alta resolución y temas Neon Black personalizados.</p>
        </div>

        <div class="ios-section-title">Datos de Cuenta</div>
        <div class="ios-group-box">
            <div class="ios-row">
                <span class="row-label">Rango</span>
                <span class="row-val" style="color: #00d2ff; font-weight: 600;">Creador / Developer</span>
            </div>
            <div class="ios-row">
                <span class="row-label">Estado de Red</span>
                <span class="row-val" style="color: #34c759;">● En Línea</span>
            </div>
            <div class="ios-row">
                <span class="row-label">ID Único</span>
                <span class="row-val">#NC-99231</span>
            </div>
        </div>

        <a href="login.html" class="ios-btn-danger">Cerrar Sesión Temporal</a>
    </div>

    <div class="tab-bar">
        <a href="lobby.html" class="tab-item">
            <span class="tab-icon">💬</span>
            <span>Chats</span>
        </a>
        <a href="perfil.html" class="tab-item active">
            <span class="tab-icon">👤</span>
            <span>Perfil</span>
        </a>
    </div>

</body>
</html>
