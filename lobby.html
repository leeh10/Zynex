<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeonCord - Lobby</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000000; color: #ffffff; min-height: 100vh; padding-bottom: 80px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(15, 15, 20, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); sticky: top; top: 0; z-index: 100; }
        .header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #ffffff, #8e8e93); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .avatar-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #ff0055, #7a00ff); border: 2px solid #00d2ff; cursor: pointer; transition: transform 0.2s; box-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        .avatar-btn:active { transform: scale(0.9); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ios-section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #8e8e93; margin-bottom: 8px; margin-left: 8px; letter-spacing: 0.5px; }
        
        .ios-group-box { background: rgba(28, 28, 30, 0.7); border-radius: 14px; overflow: hidden; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        
        .ios-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.2s; text-decoration: none; color: white; }
        .ios-row:last-child { border-bottom: none; }
        .ios-row:active { background: rgba(255, 255, 255, 0.1); }
        
        .icon-circle { width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; margin-right: 15px; font-weight: bold; }
        .bg-blue { background: rgba(0, 210, 255, 0.15); color: #00d2ff; }
        .bg-purple { background: rgba(122, 0, 255, 0.15); color: #9d4edd; }
        
        .row-text { flex: 1; }
        .row-text h3 { font-size: 16px; font-weight: 600; }
        .row-text p { font-size: 13px; color: #8e8e93; margin-top: 2px; }
        
        .chevron { color: #3a3a3c; font-weight: bold; margin-left: 10px; }

        /* Bottom Nav */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .tab-item.active { color: #00d2ff; }
        .tab-icon { font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NeonCord</h1>
        <div class="avatar-btn" onclick="window.location.href='perfil.html'"></div>
    </div>

    <div class="container">
        <div class="ios-section-title">Canales y Acción</div>
        <div class="ios-group-box">
            <a href="crear-grupo.html" class="ios-row">
                <div class="icon-circle bg-blue">＋</div>
                <div class="row-text">
                    <h3>Crear una nueva sala</h3>
                    <p>Genera un código e invita a tus compas</p>
                </div>
                <div class="chevron">❯</div>
            </a>
            <div class="ios-row" onclick="unirseCodigo()">
                <div class="icon-circle bg-purple">🔗</div>
                <div class="row-text">
                    <h3>Unirse con código</h3>
                    <p>Ingresa el token secreto de tu amigo</p>
                </div>
                <div class="chevron">❯</div>
            </a>
        </div>

        <div class="ios-section-title">Tus Chats Recientes</div>
        <div class="ios-group-box">
            <a href="chat.html" class="ios-row">
                <div class="icon-circle" style="background: #23242c; color:#ff0055;">🔥</div>
                <div class="row-text">
                    <h3>Sala Secreta #VIP</h3>
                    <p>Último mensaje: ¡Manda el audio bro! • 10m</p>
                </div>
                <div class="chevron">❯</div>
            </a>
        </div>
    </div>

    <div class="tab-bar">
        <a href="lobby.html" class="tab-item active">
            <span class="tab-icon">💬</span>
            <span>Chats</span>
        </a>
        <a href="perfil.html" class="tab-item">
            <span class="tab-icon">👤</span>
            <span>Perfil</span>
        </a>
    </div>

    <script>
        function unirseCodigo() {
            let cod = prompt("Ingresa el código de la sala:");
            if(cod) window.location.href = "chat.html?room=" + cod;
        }
    </script>
</body>
</html>
