<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeonCord - Cargando System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #000000; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* Contenedor de la animación */
        .loader-container { text-align: center; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 20px; background: linear-gradient(135deg, #00d2ff, #0066ff, #ff0055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%; animation: moveGradient 4s linear infinite; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Spinner estilo iOS / Cyberpunk */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.05); border-top-color: #00d2ff; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.1, 1) infinite; margin: 0 auto 15px auto; box-shadow: 0 0 12px rgba(0, 210, 255, 0.2); }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text { font-size: 13px; font-weight: 500; color: #8e8e93; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <div class="logo">NeonCord</div>
        <div class="status-text" id="status">Conectando al servidor...</div>
    </div>

    <script>
        // Simula la carga del sistema y la verificación de sesión antes de redireccionar
        document.addEventListener("DOMContentLoaded", () => {
            const statusTxt = document.getElementById('status');
            
            // Pasito 1: Simular verificación de base de datos
            setTimeout(() => {
                statusTxt.innerText = "Verificando credenciales...";
            }, 1000);

            // Pasito 2: Redireccionar al archivo principal (login.html)
            setTimeout(() => {
                statusTxt.innerText = "Accediendo...";
                
                /* Aquí es donde se conecta todo, bro.
                   Por ahora te manda a login.html. 
                   Cuando metas Firebase, puedes validar si el usuario ya está logueado:
                   - Si está logueado -> window.location.href = "lobby.html";
                   - Si no -> window.location.href = "login.html";
                */
                window.location.href = "login.html";
                
            }, 2200); // 2.2 segundos de animación premium de entrada
        });
    </script>
</body>
</html>
